# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Format
format = """
[î‚¶](red)$os$username$localip[î‚´](red) \
[î‚¶](peach)$directory[î‚´](peach) \
$git_branch\
$character"""
add_newline = true

right_format = """
$status\
$cmd_duration\
$git_state\
$git_metrics
"""

# Current theme
palette = "catppuccin_mocha"

[git_metrics]
disabled = false
added_style = "bg:mantle fg:green"
deleted_style = "bg:mantle fg:red"
only_nonzero_diffs = false
format = ' [î‚¶](mantle)[+$added]($added_style)[/](bg:mantle)[-$deleted]($deleted_style)[î‚´](mantle)'

[localip]
ssh_only = false
format = '[@$localipv4]($style)'
style = "bg:red fg:crust"
disabled = false

[cmd_duration]
show_milliseconds = true
format = " [î‚¶](lavender)[î«´ $duration]($style)[î‚´](lavender)"
style = "bg:lavender fg:crust"
disabled = false
min_time = 0

[git_branch]
symbol = "ïگک"
style = "bg:yellow"
format = '[î‚¶](yellow)[[$symbol $branch](fg:crust bg:yellow)]($style)[î‚´](yellow) '

[git_state]
disabled = false
format = ' [î‚¶](yellow)[$state( $progress_current/$progress_total)]($style)[î‚´](yellow)'
style = "bg:yellow fg:crust"

[status]
disabled = false
format = "[î‚¶](mauve)[$symbol $status]($style)[î‚´](mauve)"
symbol = "âœ—"
success_symbol = "âœ“"
sigint_symbol = "SIGINT"
signal_symbol = "âڑ،"
not_executable_symbol = "ï“´"
not_found_symbol = "ï€‚"
style = "bg:mauve fg:crust"

[directory]
style = "bg:peach fg:crust"
format = "[$read_only$path]($style)"
truncation_length = 8
read_only = "ï€£ "
truncation_symbol = ""

[character]
format = "$symbol "
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold maroon)'
vimcmd_symbol = '[V](bold green)'

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[os]
disabled = false
format = "[$symbol]($style)"
style = "bg:red fg:crust"

