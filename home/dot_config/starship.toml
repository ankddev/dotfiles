# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Format
format = """
[¯éÂ](red)$os$username$hostname[¯é┤](red) \
[¯éÂ](peach)$directory[¯é┤](peach) \
$git_branch\
$character"""
add_newline = true

right_format = """
$status\
$cmd_duration\
$git_state\
$git_metrics
"""

# Current theme
palette = "catppuccin_mocha"

[hostname]
ssh_only = false
disabled = false
format = '[@$hostname]($style)'
style = "bg:red fg:crust"

[custom.jj]
description = "The current jj status"
when = "jj --ignore-working-copy root"
shell = []
detect_folders = [".jj"]
require_repo = true
ignore_timeout = true
symbol = "´Éİ"
style = "bg:yellow"
format = '[¯éÂ](yellow)[[$symbol $output](fg:crust bg:yellow)]($style)[¯é┤](yellow) '
command = '''
jj show @ --no-patch --ignore-working-copy --color never --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "|",
    concat(
      if(conflict, "¾░║ç"),
      if(divergent, "¾░║å"),
      if(hidden, "¾░èá"),
      if(immutable, "¾░î¥"),
    ),
    if(empty, "(empty)"),
    coalesce(
      truncate_end(29, description.first_line(), "ÔÇĞ"),
      "(no description set)",
    ),
  )
'
'''

[git_metrics]
disabled = false
added_style = "bg:mantle fg:green"
deleted_style = "bg:mantle fg:red"
only_nonzero_diffs = false
format = ' [¯éÂ](mantle)[+$added]($added_style)[/](bg:mantle)[-$deleted]($deleted_style)[¯é┤](mantle)'

[localip]
ssh_only = false
format = '[@$localipv4]($style)'
style = "bg:red fg:crust"
disabled = false

[cmd_duration]
show_milliseconds = true
format = " [¯éÂ](lavender)[¯½┤ $duration]($style)[¯é┤](lavender)"
style = "bg:lavender fg:crust"
disabled = false
min_time = 0

[git_branch]
symbol = "´Éİ"
style = "bg:yellow"
format = '[¯éÂ](yellow)[[$symbol $branch](fg:crust bg:yellow)]($style)[¯é┤](yellow) '

[git_state]
disabled = false
format = ' [¯éÂ](yellow)[$state( $progress_current/$progress_total)]($style)[¯é┤](yellow)'
style = "bg:yellow fg:crust"

[status]
disabled = false
format = "[¯éÂ](mauve)[$symbol $status]($style)[¯é┤](mauve)"
symbol = "Ô£ù"
success_symbol = "Ô£ô"
sigint_symbol = "ÔÜí"
signal_symbol = "ÔÜí"
not_executable_symbol = "´ô┤"
not_found_symbol = "´Çé"
style = "bg:mauve fg:crust"

[directory]
style = "bg:peach fg:crust"
format = "[$read_only$path]($style)"
truncation_length = 8
read_only = "´Çú "
truncation_symbol = ""

[character]
format = "$symbol "
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold maroon)'
vimcmd_symbol = '[V](bold green)'

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[os]
disabled = false
format = "[$symbol]($style)"
style = "bg:red fg:crust"

